<!DOCTYPE html>
<html lang="en">
<head>

    <title>Fill the form</title>

        td,tr,th{
            border: 1px solid black;
        }
        th{
            background-color: blue;
        }
    </style>
</head>
<body>
    <center>
        <form >

            <legend>Fill the form</legend>

            <td><label >Name</label></td>

        </tr>

            <td><label >Gender</label></td>
            <td><input type="radio" name="1">Male

            <option>Blue</option>

            </select></td>
            <tr>
                <td><label>Check all that apply</label></td>

                </td>
            </tr>
            <tr>
                <td colspan="2">Describe your athletic ability:</td>
                
            </tr>
            <tr>
                <td colspan="2"><textarea></textarea></td>
            </tr>

                <td colspan="2" align="center"><button>Enter My information</button></td>
            </tr>
        </tr>
        </table>

        </fieldset>

    </form>
    </center>
    
</body>
</html>
