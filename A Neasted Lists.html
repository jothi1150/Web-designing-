<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>A Neasted Lists</title>
</head>
<body>
    <h1>A Neasted Lists</h1>
    <ul>
        <li>Coffee</li>
        <ol>
            <li>Black coffee</li>
            <ul style="list-style: '-';">
                <li>black hot coffee</li>
            </ul>
            <li>White coffee</li>
            <ul style="list-style:'-';">
                <li>White hot coffee</li>
            </ul>
        </ol>
        <li>Tea</li>
        <ol>
            <li>black tea</li>
            <li>Green Tea</li>
        </ol>
        <li>Milk</li>
    </ul>
</body>
</html>
