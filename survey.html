<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body{
            background-color: white;
        }
        fieldset{
            background-color: aqua;
        }
    </style>
    <title>Survey form</title>
</head>

<body>
<fieldset style="color: whitesmoke;">
    <h1 style="color: blue;">Please complete our survey</h1>
<h3 style="color: black;">Contact information</h3>
<label style="color: blue;">Email address:</label>
<input type="text" required placeholder="Enter Email address"><br><br>
<label style="color: blue;">First name:</label>
<input type="text" required placeholder="Enter First name"><br><br>
<label style="color: blue;">Last name:</label>
<input type="text" required placeholder="Enter Last name"><br><br>

<h3 style="color: black;">Geographic information</h3>
<label style="color: blue;">State:</label>
<input type="text" required placeholder="Enter State"><br><br>
<label style="color: blue;">Zip code:</label>
<input type="number" required placeholder="Number">

<h3 style="color: black;">How did you hear about us?</h3>
<label style="color: blue;">Web Search:</label><input type="Checkbox"><br><br>
<label style="color: blue;">Facebook:</label><input type="Checkbox"><br><br>
<label style="color: blue;">Twitter:</label><input type="Checkbox"><br><br>
<label style="color: blue;">Email message:</label><input type="Checkbox">
<h3 style="color: black;">Thank you for taking our survey!</h3>
<button style="color: black;">Submit</button>     <button style="color: black;">Reset</button>
</fieldset>
</body>
</html>
