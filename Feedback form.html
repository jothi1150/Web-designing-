<!DOCTYPE html>
<html lang="en">

<head>

    <title>Feedback form</title>
</head>

<body>
    <h1>My feedback form</h1>
    <form>
        <ul>
            <li><label>Name:</label><input type="text"></li>
            <li><label>Email:</label><input type="email"></li>
            <li><label>Password:</label><input type="password"></li>
            <br>
            <li><label>Please Check all the emotions that apply to you:</label></li>
            <ul>
                <li><label>Angry</label><input type="checkbox"></li>
                <li><label>Sad</label><input type="checkbox"></li>
                <li><label>Happy</label><input type="checkbox"></li>
                <li><label>Ambivalent</label><input type="checkbox"></li>
            </ul>
            <li>How satisfied were you with our service?</li>
            <ul>
                <li><label>Very satisfied</label><input type="radio" name="1"></li>
                <li><label>Satisfied</label><input type="radio" name="1"></li>
                <li><label>Didn't care</label><input type="radio" name="1"></li>
                <li><label>Dissatisfied</label><input type="radio" name="1"></li>
                <li><label>Very dissatisfied</label><input type="radio" name="1"></li>
            </ul>
            <br>
            <li>Further comments:<input type="text"></li>
            <li>Bio photo:<input type="text"><input type="file" name="photo"></li>
            <li>Location visited:<select name="Location">
                    <option>select location</option>
                    <option>Salem</option>
                    <option>Bangalore</option>
                    <option>Chennai</option>
                    <option>Coimbatore</option>
                </select></li>
            <li><button>Submit</button></li>
        </ul>
    </form>

</body>

</html>
